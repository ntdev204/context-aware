# Production Configuration -- Jetson Orin Nano Super
# TensorRT FP16 inference, 30 FPS target, Orbbec Astra S depth camera

system:
  mode: production
  log_level: INFO
  fps_target: 30

logging:
  dir: /app/logs # base dir for all log files
  # Per-component level overrides (defaults to INFO)
  levels:
    perception: INFO
    navigation: INFO
    experience: INFO
    communication: INFO
    server: INFO

camera:
  device_id: 0
  backend: astra
  width: 640
  height: 480
  fps: 30

perception:
  yolo:
    model_path: models/yolo/yolo11s.engine
    use_tensorrt: true
    confidence_threshold: 0.5
    iou_threshold: 0.45
    input_size: [480, 640]
    classes:
      [
        "person",
        "obstacle",
        "static_obstacle",
        "dynamic_hazard",
        "door",
        "wall",
        "free_space",
      ]

  tracker:
    max_age: 30
    min_hits: 3
    iou_threshold: 0.3

  roi:
    width: 128
    height: 256
    padding_ratio: 0.1

  cnn_intent:
    model_path: models/cnn_intent/intent_v1.pt
    use_tensorrt: false
    max_batch_size: 5

context:
  temporal_stack_size: 1
  state_version: "v1-snapshot"
  observation_dim: 104
  occupancy_grid_size: 8

navigation:
  policy_type: heuristic

  heuristic:
    cruise_free_space_threshold: 0.8
    cruise_velocity: 1.0
    cautious_velocity: 0.6
    avoid_velocity: 0.3
    follow_velocity: 0.5

  safety:
    hard_stop_distance_person: 0.5
    hard_stop_distance_obstacle: 0.3
    slow_down_distance: 1.0
    slow_down_factor: 0.5
    watchdog_timeout_ms: 500
    watchdog_log_interval_s: 5.0
    battery_threshold_pct: 10.0

communication:
  zmq:
    nav_cmd_port: 5555
    detections_port: 5556
    robot_state_port: 5560
    config_port: 5570
    rasp_pi_ip: "192.168.1.101"
    publish_rate_nav: 30
    publish_rate_det: 10
    sndhwm: 2
    rcvhwm: 2

experience:
  # ── HDF5 mode ── Set to true to re-enable RL experience logging.
  hdf5_enabled: false
  buffer_size: 10000
  jpeg_quality: 85
  write_dir: /app/logs/experience
  write_format: hdf5
  async_write: true

  # ── ROI Collection mode (active when hdf5_enabled: false) ──────────────
  roi_save_dir: /app/logs/roi_dataset # local staging dir on Jetson
  roi_batch_size: 5000 # images per archive before sending
  roi_jpeg_quality: 90 # higher = better features for CNN

  # rsync destination — Server Docker container via Tailscale VPN.
  roi_server_target: "-e 'ssh -p 2222' root@100.93.83.87:/data/roi_incoming/"

api:
  host: "0.0.0.0"
  port: 8080
  stream_jpeg_quality: 70
