# Production Configuration -- Jetson Orin Nano Super
# TensorRT FP16 inference, 30 FPS target, Orbbec Astra S depth camera

system:
  mode: production
  log_level: INFO
  fps_target: 30

logging:
  dir: /app/logs # base dir for all log files
  # Per-component level overrides (defaults to INFO)
  levels:
    perception: INFO
    navigation: INFO
    experience: INFO
    communication: INFO
    server: INFO

camera:
  device_id: 0
  backend: astra
  width: 640
  height: 480
  fps: 30

perception:
  yolo:
    model_path: models/yolo/yolo11n.engine
    use_tensorrt: true
    confidence_threshold: 0.5
    iou_threshold: 0.45
    input_size: [480, 640]
    classes:
      [
        "person",
        "obstacle",
        "static_obstacle",
        "dynamic_hazard",
        "door",
        "wall",
      ]

  tracker:
    max_age: 60      # giữ track lâu hơn khi người bị che khuất tạm thời
    min_hits: 1      # lock ngay frame đầu tiên, không cần chờ 3 frame
    iou_threshold: 0.3

  roi:
    width: 128
    height: 256
    padding_ratio: 0.1

  cnn_intent:
    model_path: null # Tạm thời tắt để tiết kiệm RAM
    use_tensorrt: false
    max_batch_size: 5

  gesture:
    enabled: true
    min_confidence: 0.65
    fist_confirm_frames: 3
    open_palm_confirm_frames: 5

context:
  temporal_stack_size: 1
  state_version: "v2-camera"
  observation_dim: 114
  occupancy_grid_size: 8

navigation:
  policy_type: heuristic

  heuristic:
    cruise_velocity: 1.0
    cautious_velocity: 0.6
    avoid_velocity: 0.3
    follow_max_vel: 0.5          # tốc độ tối đa trong follow mode
    follow_min_vel: 0.3          # tốc độ tối thiểu khi đang di chuyển
    # Follow is activated only by open-palm gesture + backend face auth.
    auto_follow: false
    follow_target_distance: 2.0  # giữ khoảng cách 2.0m với target (tránh vùng depth camera chỉ thấy chân)
    follow_deadband: 0.08        # ±0.08m: không điều chỉnh nếu sai số nhỏ hơn ngưỡng này
    follow_kp: 1.0               # hệ số P-controller (tăng = phản ứng nhanh hơn)
    target_lost_timeout_s: 300.0 # giải phóng target nếu mất track > 5 phút (300 giây)
    follow_min_distance: 0.5     # khoảng cách tối thiểu tuyệt đối — STOP nếu người < 0.5m (cho phép lùi trong [0.5m, 1.2m])

  safety:
    hard_stop_distance_person: 0.4   # Camera-based fallback only (Pi Lidar handles 0.5m+)
    hard_stop_distance_obstacle: 0.2
    slow_down_distance: 3.0
    slow_down_factor: 0.5
    watchdog_timeout_ms: 500
    watchdog_log_interval_s: 5.0
    battery_threshold_pct: 10.0

communication:
  zmq:
    nav_cmd_port: 5555
    detections_port: 5556
    robot_state_port: 5560
    config_port: 5570
    rasp_pi_ip: "25.12.4.101"
    publish_rate_nav: 30
    publish_rate_det: 10
    sndhwm: 2
    rcvhwm: 2

experience:
  # ── HDF5 mode ── Set to true to re-enable RL experience logging.
  hdf5_enabled: false
  buffer_size: 10000
  jpeg_quality: 85
  write_dir: /app/logs/experience
  write_format: hdf5
  async_write: true

  # ── ROI Collection mode (active when hdf5_enabled: false) ──────────────
  roi_save_dir: /app/data/roi_dataset # local staging dir on Jetson
  roi_batch_size: 5000 # images per archive before sending
  roi_jpeg_quality: 90 # higher = better features for CNN

  # rsync destination — Server Docker container via LAN.
  roi_server_target: "-e 'ssh -p 2222' root@25.12.4.105:/data/roi_incoming/"

api:
  host: "0.0.0.0"
  port: 8080
  stream_jpeg_quality: 45 # Hạ từ 70 xuống 45 để truyền qua 3G/4G mượt mà, độ trễ thấp

backend:
  face_verify_url: "http://100.93.83.87:8000/api/faces/verify"
  face_auth_shared_secret: ""
  face_verify_interval_s: 2.0
