# Development Configuration -- Windows/Linux laptop
# USB camera, PyTorch models (no TensorRT), debug logging

system:
  mode: development
  log_level: DEBUG
  fps_target: 30
  device: cuda

logging:
  dir: logs

camera:
  device_id: 0
  backend: usb
  width: 640
  height: 480
  fps: 30

perception:
  yolo:
    model_path: models/yolo/yolo11n.pt
    use_tensorrt: false
    confidence_threshold: 0.5
    iou_threshold: 0.45
    input_size: [480, 640]
    classes:
      [
        "person",
        "obstacle",
        "static_obstacle",
        "dynamic_hazard",
        "door",
        "wall",
        "free_space",
      ]

  freespace:
    enabled: false
    fx: 570.0
    fy: 570.0
    cx: 320.0
    cy: 240.0
    camera_height_m: 0.50
    camera_pitch_deg: 0.0
    depth_min_mm: 2000
    depth_max_mm: 8000
    downscale: 4
    ground_tolerance_m: 0.08
    obstacle_height_m: 0.10
    safety_margin_px: 18
    sector_count: 8
    sector_free_threshold: 0.55
    bbox_fallback_enabled: true
    fallback_roi_top_ratio: 0.45
    fallback_roi_top_width_ratio: 0.35
    fallback_max_obstacle_ratio: 0.65
    rgb_floor_fusion_enabled: true
    rgb_floor_fallback_enabled: true
    floor_color_threshold: 48.0
    floor_seed_bottom_ratio: 0.22
    near_floor_blind_distance_m: 2.0
    min_navigable_width_m: 1.0

  tracker:
    max_age: 30
    min_hits: 3
    iou_threshold: 0.3

  roi:
    width: 128
    height: 256
    padding_ratio: 0.1

  cnn_intent:
    model_path: null
    use_tensorrt: false
    max_batch_size: 5

context:
  temporal_stack_size: 1
  state_version: "v2-camera-freespace"
  observation_dim: 114
  occupancy_grid_size: 8

navigation:
  policy_type: heuristic

  heuristic:
    cruise_free_space_threshold: 0.8
    cruise_velocity: 1.0
    cautious_velocity: 0.6
    avoid_velocity: 0.3
    follow_velocity: 0.5

  safety:
    hard_stop_distance_person: 2.0
    hard_stop_distance_obstacle: 0.3
    slow_down_distance: 3.0
    slow_down_factor: 0.5
    watchdog_timeout_ms: 500
    watchdog_log_interval_s: 5.0
    battery_threshold_pct: 10.0

communication:
  zmq:
    nav_cmd_port: 5555
    detections_port: 5556
    robot_state_port: 5560
    config_port: 5570
    rasp_pi_ip: "25.12.4.101"
    publish_rate_nav: 30
    publish_rate_det: 10
    sndhwm: 2
    rcvhwm: 2

experience:
  enabled: true
  buffer_size: 10000
  jpeg_quality: 85
  write_dir: logs/experience
  write_format: hdf5
  async_write: true

api:
  host: "0.0.0.0"
  port: 8080
  stream_jpeg_quality: 70
