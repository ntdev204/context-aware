name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Check formatting
        run: ruff format --check src/ scripts/ tests/

      - name: Check lint
        run: ruff check src/ scripts/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install CPU deps + dev extras
        run: |
          pip install torch==2.3.1+cpu torchvision==0.18.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,cpu]"

      - name: Generate Protobuf stubs
        run: python scripts/infra/generate_proto.py

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  docker-dev:
    name: Build dev image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build
        run: |
          docker compose -f docker/docker-compose.yml --profile dev build dev
